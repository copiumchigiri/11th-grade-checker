<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #111; font-family: Georgia, serif; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>git remote add origin https://github.com/copiumchigiri/grade-check.git
git branch -M main
git push -u origin main
  <div id="root"></div>
  <script type="text/babel">
    const CLASSES = [
      "Math", "Front-end", "Physics", "Mongol hel", "Uran zohiol",
      "Chem", "English", "Geometry", "Niigem", "Council",
      "Irgenii", "Design", "Tamir", "Undesni bicheg", "History",
      "Java", "Biology", "AI"
    ];

    const INITIAL = {
      "Mongol hel": 100,
      "Uran zohiol": 98,
      "Undesni bicheg": 92,
    };

    function toExactGPA(avg) {
      if (avg >= 100) return 4.0;
      if (avg >= 93) return 4.0 - ((100 - avg) / 7) * 0.3;
      if (avg >= 90) return 3.7 + ((avg - 90) / 3) * 0.3;
      if (avg >= 87) return 3.3 + ((avg - 87) / 3) * 0.4;
      if (avg >= 83) return 3.0 + ((avg - 83) / 4) * 0.3;
      if (avg >= 80) return 2.7 + ((avg - 80) / 3) * 0.3;
      if (avg >= 77) return 2.3 + ((avg - 77) / 3) * 0.4;
      if (avg >= 73) return 2.0 + ((avg - 73) / 4) * 0.3;
      if (avg >= 70) return 1.7 + ((avg - 70) / 3) * 0.3;
      if (avg >= 67) return 1.3 + ((avg - 67) / 3) * 0.4;
      if (avg >= 63) return 1.0 + ((avg - 63) / 4) * 0.3;
      if (avg >= 60) return 0.7 + ((avg - 60) / 3) * 0.3;
      return (avg / 60) * 0.7;
    }

    function roundedGPA(exact) {
      if (exact >= 3.95) return "4.0";
      if (exact >= 3.85) return "3.9";
      if (exact >= 3.75) return "3.8";
      if (exact >= 3.65) return "3.7";
      if (exact >= 3.55) return "3.6";
      if (exact >= 3.45) return "3.5";
      return exact.toFixed(1);
    }

    function btnStyle(bg, color, extra = {}) {
      return {
        background: bg,
        color: color,
        border: "1px solid #ddd",
        borderRadius: 4,
        padding: "4px 10px",
        fontSize: 12,
        fontFamily: "Georgia, serif",
        cursor: "pointer",
        ...extra
      };
    }

    function App() {
      const [grades, setGrades] = React.useState(() => {
        try {
          const saved = localStorage.getItem("grades");
          return saved ? JSON.parse(saved) : INITIAL;
        } catch { return INITIAL; }
      });
      const [editing, setEditing] = React.useState(null);
      const [input, setInput] = React.useState("");

      React.useEffect(() => {
        localStorage.setItem("grades", JSON.stringify(grades));
      }, [grades]);

      const graded = CLASSES.filter(c => grades[c] !== undefined);
      const avg = graded.length > 0
        ? graded.reduce((s, c) => s + grades[c], 0) / graded.length
        : null;
      const exactGPA = avg !== null ? toExactGPA(avg) : null;

      function save(name) {
        const v = parseFloat(input);
        if (!isNaN(v) && v >= 0 && v <= 100) {
          setGrades(g => ({ ...g, [name]: v }));
        }
        setEditing(null);
        setInput("");
      }

      function remove(name) {
        setGrades(g => {
          const copy = { ...g };
          delete copy[name];
          return copy;
        });
      }

      return (
        <div style={{ minHeight: "100vh", background: "#fff", color: "#111", fontFamily: "Georgia, serif", maxWidth: 480, margin: "0 auto", padding: "48px 24px" }}>
          <div style={{ marginBottom: 40 }}>
            <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#999", marginBottom: 8 }}>Grade Tracker</div>
            <div style={{ fontSize: 13, color: "#bbb", borderBottom: "1px solid #eee", paddingBottom: 20 }}>
              {graded.length} of {CLASSES.length} classes graded
            </div>
          </div>

          {avg !== null && (
            <div style={{ marginBottom: 40, display: "flex", gap: 32, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#999", marginBottom: 6 }}>Average</div>
                <div style={{ fontSize: 36, fontWeight: 400, letterSpacing: -1 }}>{avg.toFixed(2)}</div>
              </div>
              <div style={{ width: 1, background: "#eee" }} />
              <div>
                <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#999", marginBottom: 6 }}>GPA (exact)</div>
                <div style={{ fontSize: 36, fontWeight: 400, letterSpacing: -1 }}>{exactGPA.toFixed(2)}</div>
              </div>
              <div style={{ width: 1, background: "#eee" }} />
              <div>
                <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#999", marginBottom: 6 }}>GPA</div>
                <div style={{ fontSize: 36, fontWeight: 400, letterSpacing: -1 }}>{roundedGPA(exactGPA)}</div>
              </div>
            </div>
          )}

          <div>
            {CLASSES.map((name, i) => {
              const g = grades[name];
              const isEditing = editing === name;
              return (
                <div key={name} style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "14px 0",
                  borderBottom: i < CLASSES.length - 1 ? "1px solid #f0f0f0" : "none",
                }}>
                  <span style={{ fontSize: 15, color: g !== undefined ? "#111" : "#bbb" }}>{name}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    {isEditing ? (
                      <>
                        <input
                          autoFocus
                          type="number" min="0" max="100"
                          value={input}
                          onChange={e => setInput(e.target.value)}
                          onKeyDown={e => e.key === "Enter" && save(name)}
                          placeholder="0-100"
                          style={{
                            width: 64, border: "none", borderBottom: "1px solid #111",
                            outline: "none", fontSize: 15, fontFamily: "Georgia, serif",
                            padding: "2px 4px", background: "transparent", textAlign: "right",
                          }}
                        />
                        <button onClick={() => save(name)} style={btnStyle("#111", "#fff")}>Save</button>
                        <button onClick={() => { setEditing(null); setInput(""); }} style={btnStyle("#fff", "#111")}>Cancel</button>
                      </>
                    ) : g !== undefined ? (
                      <>
                        <span style={{ fontSize: 15, minWidth: 36, textAlign: "right" }}>{g}</span>
                        <button onClick={() => { setEditing(name); setInput(String(g)); }} style={btnStyle("#fff", "#111")}>Edit</button>
                        <button onClick={() => remove(name)} style={btnStyle("#fff", "#bbb")}>Remove</button>
                      </>
                    ) : (
                      <button onClick={() => { setEditing(name); setInput(""); }} style={btnStyle("#fff", "#111")}>Add</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
